services:
  db:
    image: postgres:16-alpine
    container_name: proagua_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - proagua_net

  redis:
    image: redis:7-alpine
    container_name: proagua_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - proagua_net

  backend:
    build:
      context: .
      dockerfile: proagua_backend/Dockerfile
    container_name: proagua_backend
    restart: unless-stopped
    depends_on:
      - db
      - redis
    env_file:
      - ./proagua_backend/.env
    environment:
      DEBUG: "False"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/1
      USE_REDIS_CACHE: "True"
    volumes:
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - proagua_net

  celery_worker:
    build:
      context: .
      dockerfile: proagua_backend/Dockerfile
    container_name: proagua_celery_worker
    restart: unless-stopped
    depends_on:
      - backend
      - redis
      - db
    env_file:
      - ./proagua_backend/.env
    environment:
      DEBUG: "False"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/1
      USE_REDIS_CACHE: "True"
    volumes:
      - media_volume:/app/media
    command: celery -A proagua_backend worker -l info
    networks:
      - proagua_net

  celery_beat:
    build:
      context: .
      dockerfile: proagua_backend/Dockerfile
    container_name: proagua_celery_beat
    restart: unless-stopped
    depends_on:
      - backend
      - redis
      - db
    env_file:
      - ./proagua_backend/.env
    environment:
      DEBUG: "False"
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      REDIS_CACHE_URL: redis://redis:6379/1
      USE_REDIS_CACHE: "True"
    command: celery -A proagua_backend beat -l info
    networks:
      - proagua_net

  frontend:
    build:
      context: ./proagua_frontend
      dockerfile: Dockerfile
    container_name: proagua_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: /api
    networks:
      - proagua_net

  nginx:
    image: nginx:alpine
    container_name: proagua_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
    networks:
      - proagua_net

  backup:
    image: postgres:16-alpine
    container_name: proagua_backup
    restart: unless-stopped
    depends_on:
      - db
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./backups:/backups
    entrypoint: >
      sh -c "
      while true; do
        pg_dump -h db -U ${POSTGRES_USER} -d ${POSTGRES_DB} > /backups/proagua_$$(date +%Y%m%d_%H%M%S).sql;
        find /backups -type f -name '*.sql' -mtime +7 -delete;
        sleep 86400;
      done
      "
    networks:
      - proagua_net

volumes:
  postgres_data:
  redis_data:
  static_volume:
  media_volume:

networks:
  proagua_net:
    driver: bridge
