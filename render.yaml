services:
  - type: web
    name: proagua-backend
    env: docker
    dockerContext: .
    dockerfilePath: ./proagua_backend/Dockerfile
    healthCheckPath: /admin/login/
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: proagua-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: proagua-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: proagua-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: proagua-redis
          property: connectionString
      - key: USE_REDIS_CACHE
        value: "True"
      - key: ALLOWED_HOSTS
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: CSRF_TRUSTED_ORIGINS
        sync: false
      - key: SESSION_COOKIE_SECURE
        value: "True"
      - key: CSRF_COOKIE_SECURE
        value: "True"
      - key: SECURE_SSL_REDIRECT
        value: "True"

  - type: worker
    name: proagua-celery-worker
    env: docker
    dockerContext: .
    dockerfilePath: ./proagua_backend/Dockerfile.worker
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: proagua-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: proagua-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: proagua-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: proagua-redis
          property: connectionString
      - key: USE_REDIS_CACHE
        value: "True"

  - type: worker
    name: proagua-celery-beat
    env: docker
    dockerContext: .
    dockerfilePath: ./proagua_backend/Dockerfile.beat
    envVars:
      - key: SECRET_KEY
        sync: false
      - key: DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: proagua-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: proagua-redis
          property: connectionString
      - key: CELERY_BROKER_URL
        fromService:
          type: redis
          name: proagua-redis
          property: connectionString
      - key: CELERY_RESULT_BACKEND
        fromService:
          type: redis
          name: proagua-redis
          property: connectionString

  - type: web
    name: proagua-frontend
    env: docker
    dockerContext: ./proagua_frontend
    dockerfilePath: ./proagua_frontend/Dockerfile
    envVars:
      - key: NEXT_PUBLIC_API_BASE_URL
        sync: false

  - type: redis
    name: proagua-redis
    plan: starter
    ipAllowList: []
    maxmemoryPolicy: noeviction

databases:
  - name: proagua-db
    plan: starter
    databaseName: proagua_armazem
    user: proagua
